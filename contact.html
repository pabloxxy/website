<!DOCTYPE html>

<body>

    <nav>
      <ul>
        <li><a href="contact">Contact</a></li>
        <li><a href="cv">CV</a></li>
        <li><a href="about">About this site</a></li>
        <li><a href="links">Links</a></li>
      </ul>

    <h2 align="center">You can always contact me by e-mail at the following address</h2>
    <h1 align="center" id="email" style="cursor: copy;">pablodelafuente[at]uvic.ca</h1>
    <p align="center">If you are not a robot and you do not wish to destroy my brain and my inbox with spam replace "[at]" by @.</p>

    <!-- Notification when email is copied -->
    <div id="notification" style="
      position: absolute;
      top: 50%;
      left: 50%;
      background: rgb(0, 0, 0, 0.5);
      color: white;
      padding: 20px;
      display: none;
    ">
      <h2>Email copied to clipboard!</h2>
    </div>

 
    <!-- Copy email to clipboard and show notification -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const emailElement = document.getElementById('email');
        const notification = document.getElementById('notification');

        emailElement.addEventListener('click', function() {
          // Replace [at] with @ and copy to clipboard
          const emailText = emailElement.innerText.replace('[at]', '@');
          navigator.clipboard.writeText(emailText).then(() => {
            // Show notification
            notification.style.display = 'block';
            
            // Hide after 2 seconds
            setTimeout(() => {
              notification.style.display = 'none';
            }, 2000);
          });
        });
      });
    </script>

</body>
</html>
