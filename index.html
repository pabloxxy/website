<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Pablo de la Fuente — MSc in mathematics at the University of Victoria, working somewhere in between probability and combinatorics. Also likes poetry and photography.">
  
  <!-- OG tags for displaying when sending link through messages or social media -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://pablodelafuente.xyz">
  <meta property="og:title" content="Pablo de la Fuente">
  <meta property="og:description" content="MSc in mathematics at the University of Victoria, working somewhere in between probability and combinatorics.">
  <meta property="og:image" content="https://pablodelafuente.xyz/images/og-preview.png">

  <link rel="canonical" href="https://pablodelafuente.xyz">

  <title>Pablo de la Fuente</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* full viewport, clean canvas */
      height: 100vh;
      background: #fff;   
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video, img {
      /* Always stays fully in screen */
      height: min(100vh, 100vw);
    }
  </style>
</head>
<body>

  <a href="home" id="animation-link"></a>

  <!-- This finds out if the user is in mobile to load a .apng (which autoplays in every browser (even mobile) but is larger) or a .mp4 which works better in desktop browsers. -->
  <script>
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const container = document.getElementById('animation-link');
    
    if (isMobile) {
      container.innerHTML = '<img src="images/triblob12bnw.apng" fetchpriority="high" alt="Looping animation of the expected pdf of the spectra of a random matrix. Click to enter site.">';
    } else {
      // - autoplay: starts immediately (muted required by browsers)
      // - muted: ensures autoplay works in every browser
      // - loop: infinite playback
      // - playsinline: keeps video inside the page on iOS, no fullscreen takeover
      container.innerHTML = '<video autoplay muted loop playsinline preload="auto" aria-label="Looping animation of the expected pdf of the spectra of a random matrix. Click to enter site."><source src="images/triblob12bnw.mp4" type="video/mp4"></video>';
    }
  </script>

</body>
</html>
