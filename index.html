<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pablo de la Fuente</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* full viewport, clean canvas */
      min-height: 100vh;
      background: #fff;   
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      /* Always stays fully in screen */
      height: min(100vh, 100vw);
      width: min(100vh, 100vw);
      
      /* background fallback while loading (matches body) */
      background-color: #fff;
    }

  </style>
</head>
<body>

  <a href="home.html" style="cursor: pointer;" id="animation-link"></a>

  <!-- This finds out if the user is in mobile to load a webp (which autoplays in every browser (even mobile) but is larger) or an mp4 which works better in desktop browsers. -->
  <script>
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    const container = document.getElementById('animation-link');
    
    if (isMobile) {
      container.innerHTML = '<img src="images/triblob12magma-bnw.webp">';
    } else {
      // - autoplay: starts immediately (muted required by browsers)
      // - muted: ensures autoplay works in every browser
      // - loop: infinite playback
      // - playsinline: keeps video inside the page on iOS, no fullscreen takeover
      container.innerHTML = '<video autoplay muted loop playsinline preload="auto"><source src="images/triblob12magma-bnw.mp4" type="video/mp4"></video>';
    }
  </script>

</body>
</html>
