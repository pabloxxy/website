<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Pablo de la Fuente</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: #fff;
    }

    body {
      min-height: 100vh;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    a {
      background: #fff;
      display: block;
      text-decoration: none;
    }

    video {
      height: min(100vh, 100vw);
      width: min(100vh, 100vw);
    }

  </style>
</head>
<body>

  <!-- 
    - autoplay: starts immediately (muted required by browsers)
    - muted: ensures autoplay works in every browser
    - loop: infinite playback
    - playsinline: keeps video inside the page on iOS, no fullscreen takeover
  -->
  <a href="home.html" style="cursor: pointer;">
    <video 
      autoplay 
      muted 
      loop 
      playsinline 
      preload="auto"
    >
      <source src="triblob12magma-bnw.mp4" type="video/mp4">
    
    </video>
  </a>

</body>
</html>
