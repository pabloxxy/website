<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erdős–Rényi Graph</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>

      <!-- Include favicon -->
    <link rel="shortcut icon" href="images/favicon/favicon.ico">
    <script>
    fetch('favicon.html')
      .then(response => response.text())
      .then(data => {
         document.head.insertAdjacentHTML('afterbegin', data);
      });
    </script>
    
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  <script>
  // Estamos usando el acoplamiento monótono de G_{n,p}. Es decir, simular una uniforme en (0,1) por cada arista y dibujar la arista cuando el parámetro "p" sea mayor que la respectiva uniforme.

  let n = 12; // número de vértices
  let p; // variable para el slider               
  let E = []; // espacio para guardar las variables de cada arista
  let buttonDiv, pngImg, gifImg;
  let gifVisible = false;
  let gifTimer;


  function sample() {
  // Generar una variable aleatoria uniforme por cada arista
  for (let i = 0; i < n; i++) {
    E[i] = [];
    for (let j = i+1; j < n; j++) {
      E[i][j] = random(); 
    }
  }  
  }


  function playGifAndResample() {
    // Hide PNG, show GIF
    pngImg.style('display', 'none');
    gifImg.style('display', 'block');

    // Force GIF to restart from beginning
    let oldSrc = gifImg.elt.src;
    gifImg.elt.src = '';
    gifImg.elt.src = oldSrc;

    // Clear previous timer
    if (gifTimer) clearTimeout(gifTimer);

    // Resample when dice hit the ground so it looks magical
    gifTimer = setTimeout(() => {
      sample();
    }, 500); 

    // After GIF duration, hide GIF and show PNG again
    gifTimer = setTimeout(() => {
      gifImg.style('display', 'none');
      pngImg.style('display', 'block');
    }, 2000); 
  }



  function setup() {
  createCanvas(windowWidth, windowHeight);

  // Slider for probability p
  p = createSlider(0, 1, 0.5, 0.0001);
  p.position(20, height - 40);
  p.size(windowWidth - 40);


  // Create GIF image (hidden initially)
  gifImg = createImg('images/gifs/dice.gif', 'animation');
  gifImg.size(0.2 * (364/312) * Math.sqrt(windowHeight * windowWidth), 0.2 * Math.sqrt(windowHeight * windowWidth));
  gifImg.style('position', 'absolute');
  gifImg.position(0.7 * windowWidth, 0.11 * windowHeight);
  gifImg.style('display', 'none');

  // Create PNG image (cover)
  pngImg = createImg('images/gifs/dice1.png', 'click to resample');
  pngImg.size(0.2 * (364/312) * Math.sqrt(windowHeight * windowWidth), 0.2 * Math.sqrt(windowHeight * windowWidth));
  pngImg.style('position', 'absolute');
  pngImg.position(0.7 * windowWidth, 0.11 * windowHeight);
  pngImg.style('cursor', 'pointer');
  pngImg.style('display', 'block');

  pngImg.mousePressed(playGifAndResample);

  // First sample
  sample();
  }




  // Cambiar el canvas y los botones si cambia la ventana
  function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  p.position(20, windowHeight - 40);
  p.size(windowWidth - 40);
  pngImg.size(0.2 * (364/312) * Math.sqrt(windowHeight * windowWidth), 0.2 * Math.sqrt(windowHeight * windowWidth));
  pngImg.position(0.7 * windowWidth, 0.11 * windowHeight);
  gifImg.size(0.2 * (364/312) * Math.sqrt(windowHeight * windowWidth), 0.2 * Math.sqrt(windowHeight * windowWidth));
  gifImg.position(0.7 * windowWidth, 0.11 * windowHeight);
  }




  function draw() {
  translate(width/2, height/2);  
  background(220);

  //Poner los vértices en un círculo  
  let r = min(height, width) / 4;

  for (let i = 0; i < n; i++) {
    fill(0);
    circle(r * cos((2*PI/n)*i), r * sin((2*PI/n)*i), 10); 
  }

  // Cuando p sea mayor que la uniforme, dibujar esa arista.  
  for (let i = 0; i < n; i++) {
    for (let j = i+1; j < n; j++) {
      if (p.value() >= E[i][j]) {
        strokeWeight(2);
        line(r * cos((2*PI/n)*i), r * sin((2*PI/n)*i), r * cos((2*PI/n)*j), r * sin((2*PI/n)*j));
      } 
    }
    }  

  // Texto
  textSize(28);
  // Siempre 2 decimales en el texto para p
  text("p = " + p.value().toFixed(2), -width/2 + 20, -height/2 + 48)
  }

  </script>
</head>
<body>
</body>
</html>
